<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina niet gevonden — De Formatie</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a1628;
            color: #f5f0e8;
            font-family: 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }
        .logo {
            font-size: 4rem;
            margin-bottom: 20px;
        }
        h1 {
            font-family: 'Georgia', serif;
            font-size: 2.5rem;
            color: #c9a84c;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2rem;
            color: #8a7a5a;
            margin-bottom: 30px;
            max-width: 500px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            background: #c9a84c;
            color: #0a1628;
            padding: 15px 30px;
            text-decoration: none;
            font-family: sans-serif;
            font-weight: bold;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #e8c96a;
        }
        .error-code {
            font-family: monospace;
            font-size: 6rem;
            color: #2a3f6a;
            margin-top: 40px;
        }
    </style>
</head>
<body>
    <div class="logo">⚖</div>
    <h1>Pagina niet gevonden</h1>
    <p>Deze pagina bestaat niet (meer). Misschien is het coalitieakkoord verbroken of is de motie verworpen.</p>
    <a href="/index.html" class="btn">Terug naar het spel</a>
    <div class="error-code">404</div>
</body>
</html>
