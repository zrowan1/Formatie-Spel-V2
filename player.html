<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>De Formatie — Spelersdashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:      #0a1628;
      --navy-mid:  #0f1f3d;
      --navy-card: #132040;
      --gold:      #c9a84c;
      --gold-dim:  rgba(201,168,76,0.3);
      --cream:     #f5f0e8;
      --text-dim:  rgba(245,240,232,0.55);
      --border:    rgba(201,168,76,0.18);
      --green:     #2e7d32;
      --red:       #c62828;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background: var(--navy);
      color: var(--cream);
      font-family: 'EB Garamond', serif;
      font-size: 16px;
    }

    /* ── STATUS BAR ── */
    .status-bar {
      background: var(--navy-mid);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .status-brand {
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      color: var(--gold);
      letter-spacing: 0.06em;
    }
    .status-vote-label {
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      color: var(--gold);
      background: rgba(201,168,76,0.12);
      border: 1px solid var(--gold-dim);
      border-radius: 4px;
      padding: 3px 8px;
      display: none;
    }
    .status-vote-label.active { display: block; }

    /* ── PARTY CARD ── */
    .party-card {
      max-width: 540px;
      margin: 0 auto;
      padding: 20px 16px 120px;
    }
    .party-header {
      text-align: center;
      padding: 24px 0 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .party-abbr {
      font-family: 'Oswald', sans-serif;
      font-size: 3rem;
      color: var(--gold);
      letter-spacing: 0.08em;
      line-height: 1;
    }
    .party-full {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--cream);
      margin-top: 6px;
    }
    .party-leader {
      font-family: 'Oswald', sans-serif;
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-top: 4px;
      letter-spacing: 0.04em;
    }

    .section-label {
      font-family: 'Oswald', sans-serif;
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .section-value {
      font-family: 'EB Garamond', serif;
      font-size: 1rem;
      color: var(--cream);
      line-height: 1.5;
    }
    .card-section {
      background: var(--navy-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .crown-jewel {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      color: var(--gold);
      font-weight: 700;
    }
    .dealbreaker-badge {
      display: inline-block;
      background: rgba(198,40,40,0.15);
      border: 1px solid rgba(198,40,40,0.4);
      color: #ef9a9a;
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      padding: 3px 8px;
      border-radius: 4px;
      margin-top: 4px;
    }
    .intro-text {
      font-style: italic;
      color: var(--text-dim);
      font-size: 0.95rem;
      line-height: 1.55;
    }

    /* ── BONUS TOGGLE ── */
    .bonus-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      text-align: left;
      margin-top: 4px;
    }
    .bonus-toggle:hover { border-color: var(--gold-dim); color: var(--cream); }
    .bonus-revealed {
      display: none;
      margin-top: 10px;
      padding: 10px 12px;
      background: rgba(201,168,76,0.08);
      border: 1px solid var(--gold-dim);
      border-radius: 6px;
      font-family: 'EB Garamond', serif;
      font-size: 0.95rem;
      color: var(--gold);
    }
    .bonus-revealed.visible { display: block; }

    /* ── VOTE OVERLAY ── */
    .vote-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,22,40,0.97);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .vote-overlay.active { display: flex; }
    .vote-overlay-badge {
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      color: var(--gold);
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }
    .vote-overlay-topic {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--cream);
      margin-bottom: 8px;
    }
    .vote-overlay-party {
      font-family: 'Oswald', sans-serif;
      font-size: 0.9rem;
      color: var(--text-dim);
      margin-bottom: 36px;
    }
    .vote-btns {
      display: flex;
      gap: 16px;
      width: 100%;
      max-width: 340px;
    }
    .vote-btn {
      flex: 1;
      padding: 22px 10px;
      border: none;
      border-radius: 10px;
      font-family: 'Oswald', sans-serif;
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .vote-btn:active { transform: scale(0.96); }
    .vote-btn.voor {
      background: var(--green);
      color: #fff;
    }
    .vote-btn.tegen {
      background: var(--red);
      color: #fff;
    }
    .vote-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .vote-confirmation {
      display: none;
      margin-top: 28px;
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--gold);
    }
    .vote-confirmation.visible { display: block; }

    /* ── ELECTION OVERLAY ── */
    .election-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,22,40,0.97);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px;
      overflow-y: auto;
    }
    .election-overlay.active { display: flex; }
    .election-overlay-badge {
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      color: var(--gold);
      letter-spacing: 0.12em;
      margin-bottom: 10px;
      margin-top: 8px;
    }
    .election-overlay-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--cream);
      margin-bottom: 6px;
      text-align: center;
    }
    .election-overlay-sub {
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-bottom: 20px;
      text-align: center;
    }
    .election-counter {
      font-family: 'Oswald', sans-serif;
      font-size: 1.1rem;
      color: var(--gold);
      margin-bottom: 18px;
      text-align: center;
    }
    .election-counter.zero { color: #4caf50; }
    .election-parties {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }
    .election-party-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 8px;
      padding: 10px 14px;
    }
    .election-party-name {
      font-family: 'Oswald', sans-serif;
      font-size: 0.95rem;
      color: var(--cream);
      flex: 1;
    }
    .election-party-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .election-adj-btn {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 6px;
      background: rgba(201,168,76,0.1);
      color: var(--gold);
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .election-adj-btn:active { background: rgba(201,168,76,0.25); }
    .election-adj-btn:disabled { opacity: 0.25; cursor: not-allowed; }
    .election-party-count {
      font-family: 'Oswald', sans-serif;
      font-size: 1.1rem;
      color: var(--cream);
      min-width: 24px;
      text-align: center;
    }
    .election-submit-btn {
      width: 100%;
      max-width: 380px;
      padding: 18px;
      border: none;
      border-radius: 10px;
      background: var(--gold);
      color: var(--navy);
      font-family: 'Oswald', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .election-submit-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .election-confirmation {
      display: none;
      margin-top: 20px;
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--gold);
      text-align: center;
    }
    .election-confirmation.visible { display: block; }

    /* ── STANDPUNTEN LIST ── */
    .standpunten-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .standpunten-list li {
      font-family: 'EB Garamond', serif;
      font-size: 0.95rem;
      color: var(--cream);
      line-height: 1.45;
      padding-left: 18px;
      position: relative;
    }
    .standpunten-list li::before {
      content: '▶';
      position: absolute;
      left: 0;
      top: 1px;
      font-size: 0.6rem;
      color: var(--gold);
    }

    /* ── MUST-HAVE ── */
    .must-have-value {
      font-family: 'EB Garamond', serif;
      font-size: 1rem;
      color: #a5d6a7;
      line-height: 1.5;
    }
    .must-have-points {
      display: inline-block;
      margin-top: 4px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.7rem;
      color: #a5d6a7;
      background: rgba(46,125,50,0.15);
      border: 1px solid rgba(46,125,50,0.35);
      border-radius: 4px;
      padding: 2px 7px;
      letter-spacing: 0.05em;
    }

    /* ── SPEELTIP TOGGLE ── */
    .speeltip-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      text-align: left;
      margin-top: 4px;
    }
    .speeltip-toggle:hover { border-color: var(--gold-dim); color: var(--cream); }
    .speeltip-revealed {
      display: none;
      margin-top: 10px;
      padding: 10px 12px;
      background: rgba(201,168,76,0.06);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: 'EB Garamond', serif;
      font-size: 0.95rem;
      color: var(--cream);
      line-height: 1.5;
      font-style: italic;
    }
    .speeltip-revealed.visible { display: block; }

    /* ── ERROR / LOADING ── */
    .error-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      padding: 32px;
      text-align: center;
    }
    .error-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--gold);
      margin-bottom: 12px;
    }
    .error-text {
      font-family: 'EB Garamond', serif;
      font-size: 1rem;
      color: var(--text-dim);
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="status-brand">⚖ DE FORMATIE</div>
    <div class="status-vote-label" id="status-vote-label"></div>
  </div>

  <!-- MAIN CONTENT (filled by JS) -->
  <div id="main-content"></div>

  <!-- VOTE OVERLAY -->
  <div class="vote-overlay" id="vote-overlay">
    <div class="vote-overlay-badge">🗳 STEMMING GEOPEND</div>
    <div class="vote-overlay-topic" id="vote-overlay-topic"></div>
    <div class="vote-overlay-party" id="vote-overlay-party"></div>
    <div class="vote-btns">
      <button class="vote-btn voor" id="btn-voor" onclick="castVote('voor')">VOOR</button>
      <button class="vote-btn tegen" id="btn-tegen" onclick="castVote('tegen')">TEGEN</button>
    </div>
    <div class="vote-confirmation" id="vote-confirmation"></div>
  </div>

  <!-- ELECTION OVERLAY -->
  <div class="election-overlay" id="election-overlay">
    <div class="election-overlay-badge">🗳 VERKIEZINGEN</div>

    <div class="election-overlay-sub" id="election-overlay-sub"></div>
    <div class="election-counter" id="election-counter"></div>
    <div class="election-parties" id="election-parties"></div>
    <button class="election-submit-btn" id="election-submit-btn" disabled onclick="submitElection()">
      Stem uitbrengen

    <div class="election-confirmation" id="election-confirmation"></div>

  function updateElectionCounter() {
    const used = Object.values(electionDistribution).reduce((a, b) => a + b, 0);
    const left = electionMySeats - used;
    const counter = document.getElementById('election-counter');
    if (!counter) return;
    counter.textContent = left === 0 ? '✓ Alle stemfiches verdeeld' : `Nog ${left} te verdelen`;
    counter.className = 'election-counter' + (left === 0 ? ' zero' : '');
    const alreadySubmitted = sessionStorage.getItem('submitted_VERKIEZING');
    document.getElementById('election-submit-btn').disabled = left !== 0 || !!alreadySubmitted;
    electionOtherParties.forEach(id => {
      const minBtn = document.getElementById(`elec-min-${id}`);
      const plusBtn = document.getElementById(`elec-plus-${id}`);
      if (minBtn) minBtn.disabled = electionDistribution[id] <= 0;
      if (plusBtn) plusBtn.disabled = left <= 0;
    });
  }

  function adjustElectionVote(id, delta) {
    electionDistribution[id] = Math.max(0, (electionDistribution[id] || 0) + delta);
    document.getElementById(`elec-count-${id}`).textContent = electionDistribution[id];
    updateElectionCounter();
  }

      const row = document.createElement('div');
      row.className = 'election-party-row';
      row.innerHTML = `
        <span class="election-party-name">${name}</span>
        <div class="election-party-controls">
          <button class="election-adj-btn" id="elec-min-${id}" disabled
            onclick="adjustElectionVote('${id}', -1)">−</button>
          <span class="election-party-count" id="elec-count-${id}">0</span>
          <button class="election-adj-btn" id="elec-plus-${id}"
            onclick="adjustElectionVote('${id}', 1)">+</button>
        </div>`;
      partiesEl.appendChild(row);
    });

    const alreadySubmitted = sessionStorage.getItem('submitted_VERKIEZING');
    if (alreadySubmitted) {
      const conf = document.getElementById('election-confirmation');
      conf.textContent = '✓ Jouw stem is uitgebracht';
      conf.classList.add('visible');
    } else {
      document.getElementById('election-confirmation').classList.remove('visible');
    }

    updateElectionCounter();
    document.getElementById('election-overlay').classList.add('active');
  }

  function hideElectionOverlay() {
    document.getElementById('election-overlay').classList.remove('active');
    document.getElementById('election-confirmation').classList.remove('visible');
  }

  async function submitElection() {
    const btn = document.getElementById('election-submit-btn');
    if (btn.disabled) return;
    if (sessionStorage.getItem('submitted_VERKIEZING')) return;
    btn.disabled = true;

    const { error } = await sb.from('player_votes').upsert({
      game_id:    gameId,
      party_id:   partyId,
      vote_topic: 'VERKIEZING',
      choice:     JSON.stringify(electionDistribution),
    }, { onConflict: 'game_id,party_id,vote_topic' });

    if (error) {
      console.error('Supabase election submit error:', error.code, error.message, error.details);
      btn.disabled = false;
      alert(`Fout bij indienen: ${error.message || 'Probeer opnieuw.'}`);
      return;
    }

    sessionStorage.setItem('submitted_VERKIEZING', '1');
    const conf = document.getElementById('election-confirmation');
    conf.textContent = '✓ Jouw stem is uitgebracht';
    conf.classList.add('visible');
  }

  // ── CAST VOTE ────────────────────────────────────────────────
  async function castVote(choice) {
    const topic = currentVoteTopic;
    if (!topic) return;
    if (sessionStorage.getItem(`voted_${topic}`)) return;

    document.getElementById('btn-voor').disabled  = true;
    document.getElementById('btn-tegen').disabled = true;

    const { error } = await sb.from('player_votes').upsert({
      game_id:      gameId,
      party_id:     partyId,
      vote_topic:   topic,
      choice:       choice,
    }, { onConflict: 'game_id,party_id,vote_topic' });

    if (error) {
      console.error('Supabase vote error:', error.code, error.message, error.details);
      document.getElementById('btn-voor').disabled  = false;
      document.getElementById('btn-tegen').disabled = false;
      alert(`Fout bij stemmen: ${error.message || 'Probeer opnieuw.'}`);
      return;
    }

    sessionStorage.setItem(`voted_${topic}`, choice);
    const conf = document.getElementById('vote-confirmation');
    conf.textContent = `Jouw stem: ${choice.toUpperCase()} ✓`;
    conf.classList.add('visible');
  }

  // ── SESSION HANDLER ──────────────────────────────────────────
  function updateFromSession(session) {
    updateStatusBar(session.vote_open, session.vote_label);
    if (session.vote_open && session.vote_topic === 'VERKIEZING') {
      hideVoteOverlay();
      showElectionOverlay(session);
    } else if (session.vote_open && session.vote_topic) {
      hideElectionOverlay();
      showVoteOverlay(session.vote_topic, session.vote_label);
    } else {
      hideVoteOverlay();
      hideElectionOverlay();
    }
  }

  async function loadSession() {
    const { data } = await sb.from('game_sessions')
      .select('*')
      .eq('game_id', gameId)
      .single();
    if (data) updateFromSession(data);
  }

  function subscribeSession() {
    sb.channel('session_feed_' + gameId)
      .on('postgres_changes', {
        event: 'UPDATE',
        schema: 'public',
        table: 'game_sessions',
        filter: `game_id=eq.${gameId}`,
      }, (payload) => {
        updateFromSession(payload.new);
      })
      .subscribe(async (status) => {
        if (status === 'SUBSCRIBED') {
          await loadSession();
        }
      });
  }

  // ── INIT ─────────────────────────────────────────────────────
  (async () => {
    if (!partyId || !gameId) {
      showError('Ongeldige link', 'Deze link mist een partij of spel-ID. Vraag de spelleider om een nieuwe QR-code.');
      return;
    }
    const party = PARTIES.find(p => p.id === partyId);
    if (!party) {
      showError('Onbekende partij', `"${partyId}" is geen geldige partij.`);
      return;
    }

    renderPartyCard();
    await loadSession();
    subscribeSession();
  })();
  </script>
</body>
</html>
