<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>De Formatie — Spelersdashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&family=Oswald:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:      #0a1628;
      --navy-mid:  #0f1f3d;
      --navy-card: #132040;
      --gold:      #c9a84c;
      --gold-dim:  rgba(201,168,76,0.3);
      --cream:     #f5f0e8;
      --text-dim:  rgba(245,240,232,0.55);
      --border:    rgba(201,168,76,0.18);
      --green:     #2e7d32;
      --red:       #c62828;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background: var(--navy);
      color: var(--cream);
      font-family: 'EB Garamond', serif;
      font-size: 16px;
    }

    /* ── STATUS BAR ── */
    .status-bar {
      background: var(--navy-mid);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .status-brand {
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      color: var(--gold);
      letter-spacing: 0.06em;
    }
    .status-vote-label {
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      color: var(--gold);
      background: rgba(201,168,76,0.12);
      border: 1px solid var(--gold-dim);
      border-radius: 4px;
      padding: 3px 8px;
      display: none;
    }
    .status-vote-label.active { display: block; }

    /* ── PARTY CARD ── */
    .party-card {
      max-width: 540px;
      margin: 0 auto;
      padding: 20px 16px 120px;
    }
    .party-header {
      text-align: center;
      padding: 24px 0 16px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 20px;
    }
    .party-abbr {
      font-family: 'Oswald', sans-serif;
      font-size: 3rem;
      color: var(--gold);
      letter-spacing: 0.08em;
      line-height: 1;
    }
    .party-full {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      color: var(--cream);
      margin-top: 6px;
    }
    .party-leader {
      font-family: 'Oswald', sans-serif;
      font-size: 0.8rem;
      color: var(--text-dim);
      margin-top: 4px;
      letter-spacing: 0.04em;
    }

    .section-label {
      font-family: 'Oswald', sans-serif;
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 5px;
    }
    .section-value {
      font-family: 'EB Garamond', serif;
      font-size: 1rem;
      color: var(--cream);
      line-height: 1.5;
    }
    .card-section {
      background: var(--navy-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .crown-jewel {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      color: var(--gold);
      font-weight: 700;
    }
    .dealbreaker-badge {
      display: inline-block;
      background: rgba(198,40,40,0.15);
      border: 1px solid rgba(198,40,40,0.4);
      color: #ef9a9a;
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      padding: 3px 8px;
      border-radius: 4px;
      margin-top: 4px;
    }
    .intro-text {
      font-style: italic;
      color: var(--text-dim);
      font-size: 0.95rem;
      line-height: 1.55;
    }

    /* ── BONUS TOGGLE ── */
    .bonus-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      text-align: left;
      margin-top: 4px;
    }
    .bonus-toggle:hover { border-color: var(--gold-dim); color: var(--cream); }
    .bonus-revealed {
      display: none;
      margin-top: 10px;
      padding: 10px 12px;
      background: rgba(201,168,76,0.08);
      border: 1px solid var(--gold-dim);
      border-radius: 6px;
      font-family: 'EB Garamond', serif;
      font-size: 0.95rem;
      color: var(--gold);
    }
    .bonus-revealed.visible { display: block; }

    .agenda-pending {
      font-family: 'EB Garamond', serif;
      font-size: 0.9rem;
      color: var(--text-dim);
      font-style: italic;
    }
    .agenda-toggle {
      background: none;
      border: 1px solid #9b8de8;
      color: #9b8de8;
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      text-align: left;
      margin-top: 4px;
    }
    .agenda-toggle:hover { border-color: #b8aff0; color: var(--cream); }
    .agenda-revealed {
      display: none;
      margin-top: 10px;
      padding: 12px;
      background: rgba(155,141,232,0.08);
      border: 1px solid #9b8de8;
      border-radius: 6px;
    }
    .agenda-revealed.visible { display: block; }
    .agenda-type-badge {
      font-family: 'Oswald', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.08em;
      color: #9b8de8;
      margin-bottom: 6px;
    }
    .agenda-definition {
      font-family: 'EB Garamond', serif;
      font-size: 0.95rem;
      color: var(--cream);
      line-height: 1.5;
      margin-bottom: 6px;
    }
    .agenda-points {
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      color: #9b8de8;
      letter-spacing: 0.05em;
    }

    /* ── VOTE OVERLAY ── */
    .vote-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,22,40,0.97);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .vote-overlay.active { display: flex; }
    .vote-overlay-badge {
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      color: var(--gold);
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }
    .vote-overlay-topic {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--cream);
      margin-bottom: 8px;
    }
    .vote-overlay-party {
      font-family: 'Oswald', sans-serif;
      font-size: 0.9rem;
      color: var(--text-dim);
      margin-bottom: 36px;
    }
    .vote-btns {
      display: flex;
      gap: 16px;
      width: 100%;
      max-width: 340px;
    }
    .vote-btn {
      flex: 1;
      padding: 22px 10px;
      border: none;
      border-radius: 10px;
      font-family: 'Oswald', sans-serif;
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .vote-btn:active { transform: scale(0.96); }
    .vote-btn.voor {
      background: var(--green);
      color: #fff;
    }
    .vote-btn.tegen {
      background: var(--red);
      color: #fff;
    }
    .vote-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .vote-confirmation {
      display: none;
      margin-top: 28px;
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--gold);
    }
    .vote-confirmation.visible { display: block; }

    /* ── ELECTION OVERLAY ── */
    .election-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,22,40,0.97);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      padding: 24px 20px;
      overflow-y: auto;
    }
    .election-overlay.active { display: flex; }
    .election-overlay-badge {
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      color: var(--gold);
      letter-spacing: 0.12em;
      margin-bottom: 10px;
      margin-top: 8px;
    }
    .election-overlay-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--cream);
      margin-bottom: 6px;
      text-align: center;
    }
    .election-overlay-sub {
      font-family: 'Oswald', sans-serif;
      font-size: 0.85rem;
      color: var(--text-dim);
      margin-bottom: 20px;
      text-align: center;
    }
    .election-counter {
      font-family: 'Oswald', sans-serif;
      font-size: 1.1rem;
      color: var(--gold);
      margin-bottom: 18px;
      text-align: center;
    }
    .election-counter.zero { color: #4caf50; }
    .election-parties {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }
    .election-party-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 8px;
      padding: 10px 14px;
    }
    .election-party-name {
      font-family: 'Oswald', sans-serif;
      font-size: 0.95rem;
      color: var(--cream);
      flex: 1;
    }
    .election-party-controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .election-adj-btn {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 6px;
      background: rgba(201,168,76,0.1);
      color: var(--gold);
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .election-adj-btn:active { background: rgba(201,168,76,0.25); }
    .election-adj-btn:disabled { opacity: 0.25; cursor: not-allowed; }
    .election-party-count {
      font-family: 'Oswald', sans-serif;
      font-size: 1.1rem;
      color: var(--cream);
      min-width: 24px;
      text-align: center;
    }
    .election-submit-btn {
      width: 100%;
      max-width: 380px;
      padding: 18px;
      border: none;
      border-radius: 10px;
      background: var(--gold);
      color: var(--navy);
      font-family: 'Oswald', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .election-submit-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .election-confirmation {
      display: none;
      margin-top: 20px;
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--gold);
      text-align: center;
    }
    .election-confirmation.visible { display: block; }

    /* ── STANDPUNTEN LIST ── */
    .standpunten-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }
    .standpunten-list li {
      font-family: 'EB Garamond', serif;
      font-size: 0.95rem;
      color: var(--cream);
      line-height: 1.45;
      padding-left: 18px;
      position: relative;
    }
    .standpunten-list li::before {
      content: '▶';
      position: absolute;
      left: 0;
      top: 1px;
      font-size: 0.6rem;
      color: var(--gold);
    }

    /* ── MUST-HAVE ── */
    .must-have-value {
      font-family: 'EB Garamond', serif;
      font-size: 1rem;
      color: #a5d6a7;
      line-height: 1.5;
    }
    .must-have-points {
      display: inline-block;
      margin-top: 4px;
      font-family: 'Oswald', sans-serif;
      font-size: 0.7rem;
      color: #a5d6a7;
      background: rgba(46,125,50,0.15);
      border: 1px solid rgba(46,125,50,0.35);
      border-radius: 4px;
      padding: 2px 7px;
      letter-spacing: 0.05em;
    }

    /* ── SPEELTIP TOGGLE ── */
    .speeltip-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'Oswald', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      width: 100%;
      text-align: left;
      margin-top: 4px;
    }
    .speeltip-toggle:hover { border-color: var(--gold-dim); color: var(--cream); }
    .speeltip-revealed {
      display: none;
      margin-top: 10px;
      padding: 10px 12px;
      background: rgba(201,168,76,0.06);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: 'EB Garamond', serif;
      font-size: 0.95rem;
      color: var(--cream);
      line-height: 1.5;
      font-style: italic;
    }
    .speeltip-revealed.visible { display: block; }

    /* ── ERROR / LOADING ── */
    .error-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 80vh;
      padding: 32px;
      text-align: center;
    }
    .error-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      color: var(--gold);
      margin-bottom: 12px;
    }
    .error-text {
      font-family: 'EB Garamond', serif;
      font-size: 1rem;
      color: var(--text-dim);
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <!-- STATUS BAR -->
  <div class="status-bar">
    <div class="status-brand">⚖ DE FORMATIE</div>
    <div class="status-vote-label" id="status-vote-label"></div>
  </div>

  <!-- MAIN CONTENT (filled by JS) -->
  <div id="main-content"></div>

  <!-- VOTE OVERLAY -->
  <div class="vote-overlay" id="vote-overlay">
    <div class="vote-overlay-badge">🗳 STEMMING GEOPEND</div>
    <div class="vote-overlay-topic" id="vote-overlay-topic"></div>
    <div class="vote-overlay-party" id="vote-overlay-party"></div>
    <div class="vote-btns">
      <button class="vote-btn voor" id="btn-voor" onclick="castVote('voor')">VOOR</button>
      <button class="vote-btn tegen" id="btn-tegen" onclick="castVote('tegen')">TEGEN</button>
    </div>
    <div class="vote-confirmation" id="vote-confirmation"></div>
  </div>

  <!-- ELECTION OVERLAY -->
  <div class="election-overlay" id="election-overlay">
    <div class="election-overlay-badge">🗳 VERKIEZINGEN</div>
    <div class="election-overlay-title">Verdeel jouw stemfiches</div>
    <div class="election-overlay-sub" id="election-overlay-sub"></div>
    <div class="election-counter" id="election-counter"></div>
    <div class="election-parties" id="election-parties"></div>
    <button class="election-submit-btn" id="election-submit-btn" disabled onclick="submitElection()">
      Stem uitbrengen
    </button>
    <div class="election-confirmation" id="election-confirmation"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="data.js"></script>

  const PARTY_MUST_HAVE = {

  const PARTY_RELATIES = {
    PPP:  'Natuurlijke bondgenoten: FBL (minder werken = minder uitstoot) en KCV (subsidies voor een betere samenleving). WIFI is een mogelijke partner als innovatie groen wordt ingezet.',

    KKB:  'Natuurlijke bondgenoten: VBB (Nederlands voedselerfgoed) en DDP (minder regelgeving). FRR deelt de liefde voor traditie.',
    DDP:  'Natuurlijke bondgenoten: WIFI (innovatie = groei) en KKB (minder regelgeving). FRR deelt de liefde voor begrotingsdiscipline.',

    PAN:  'Mogelijke bondgenoten: FBL (minder verplichtingen past wel) en DDP (minder overheid — maar om totaal andere redenen). Verder potentieel met iedereen die iets wil afschaffen.',

  };

  const PARTY_SPEELTIP = {
    PPP:  'Als je niet weet wat je moet zeggen: betrek alles terug naar het klimaat. Defensie? "Maar wat doet het leger voor de CO2-uitstoot?" Economie? "Eco-harmonie, bedoel je!"',
    FBL:  'Geeuw veel. Stel voor om pauze te nemen. Als iemand een complex plan uitlegt, zeg: "Kunnen we dat niet gewoon niet doen? Scheelt een hoop werk."',
    KCV:  'Verzin ter plekke nep-citaten en nep-dichters. Hoe overtuigender je het brengt, hoe leuker. "Zoals Henriette van der Kwast schreef in 1897..."',

    DAM:  'Maak je punt nooit af. Begin elke zin met iets stelligs en draai halverwege. "Ik vind dat we absoluut moeten... maar laten we eerst kijken of..."',
    VBB:  'Vergelijk letterlijk alles met eten. Defensie = "de krokante korst die ons beschermt." Onderwijs = "het recept voor de toekomst." Begrotingstekort = "een stamppot zonder rookworst."',
    KKB:  'Breng ALLES terug naar kaas. Het wordt nooit oud (kaas wordt alleen maar beter met de tijd). Je kunt nooit te veel over kaas praten.',
    DDP:  'Alles is een investering. Alles is een groeikans. Alles is een markt. Als iemand over gevoel praat, vertaal het naar cijfers.',
    FRR:  'Kijk constant op je horloge. Onderbreek mensen als ze te lang praten. Tel mee hoeveel seconden iemand over z\'n tijd gaat.',
    PAN:  'Wees het overal automatisch mee oneens. Als iemand van mening verandert, verander jij ook. Je bent de chaos. Omarm het.',
    OMA:  'Speel OMA als iemand die het altijd goed bedoelt maar niemand meer volgt. Elk punt begint met "Nou, in mijn tijd..." en eindigt ergens anders dan het begon.',
    BNB:  'Speel BNB als iemand die diep overtuigd is dat de stad het probleem is. Betsie de koe is altijd het beste argument.',
    WOK:  'Speel WOK als iemand die persoonlijk geraakt is door elk debatpunt. De wachtlijst van jaar zeven is altijd relevant — ook als het over kaasbeleid gaat.',
    KGW:  'Speel KGW volkomen serieus. De bijbeltekst is altijd relevant. "Zoals staat geschreven in Spreuken 14:23 — dus daarom is de 3-daagse werkweek een zonde."',
    SVB:  'Speel SVB als eeuwig optimistisch en teamgericht. Elk conflict is "een kans om als team te groeien". Nooit negatief, altijd in beweging.',
  };

  // AGENDA_DEFINITIONS wordt geladen vanuit data.js

  let myAgenda = null;

  // ── URL PARAMS ──────────────────────────────────────────────
  const params  = new URLSearchParams(window.location.search);
  const partyId = params.get('party');
  const gameId  = params.get('game');

  let currentVoteTopic = null;

  // ── RENDER ERROR ────────────────────────────────────────────
  function showError(title, text) {
    document.getElementById('main-content').innerHTML = `
      <div class="error-screen">
        <div class="error-title">${title}</div>
        <div class="error-text">${text}</div>
      </div>`;
  }

  // ── RENDER PARTY CARD ────────────────────────────────────────
  function renderPartyCard() {
    const party = PARTIES.find(p => p.id === partyId);
    if (!party) { showError('Onbekende partij', `Partij "${partyId}" bestaat niet.`); return; }

    const db = PARTY_DEALBREAKERS[partyId];
    const dbParty = db ? PARTIES.find(p => p.id === db) : null;
    const dbLabel = dbParty ? `Dealbreaker: niet met ${db} (${dbParty.full})` : null;

    const standpunten = PARTY_STANDPUNTEN[partyId] || [];
    const standpuntenHtml = standpunten.length
      ? `<ul class="standpunten-list">${standpunten.map(s => `<li>${s}</li>`).join('')}</ul>`
      : '<div class="section-value">—</div>';

    const mustHave = PARTY_MUST_HAVE[partyId];
    const mustHaveHtml = mustHave
      ? `<div class="must-have-value">${mustHave}</div><span class="must-have-points">+5 punten als dit in het akkoord staat</span>`
      : '<div class="section-value">—</div>';

    const relaties = PARTY_RELATIES[partyId];
    const speeltip = PARTY_SPEELTIP[partyId];

    document.getElementById('main-content').innerHTML = `
      <div class="party-card">
        <div class="party-header">
          <div class="party-abbr">${party.name}</div>
          <div class="party-full">${party.full}</div>
          <div class="party-leader">Lijsttrekker: ${PARTY_LEADERS[partyId] || '—'}</div>
        </div>

        <div class="card-section">
          <div class="section-label">Wie zijn jullie?</div>
          <div class="section-value intro-text">${PARTY_INTROS[partyId] || '—'}</div>
        </div>

        ${standpunten.length ? `
        <div class="card-section">
          <div class="section-label">Standpunten</div>
          ${standpuntenHtml}
        </div>` : ''}

        <div class="card-section">
          <div class="section-label">Kroonjuweel</div>
          <div class="section-value crown-jewel">${PARTY_CROWN_JEWELS[partyId] || '—'}</div>
        </div>

        ${mustHave ? `
        <div class="card-section">
          <div class="section-label">Must-have voor het akkoord</div>
          ${mustHaveHtml}
        </div>` : ''}

        <div class="card-section">
          <div class="section-label">Karakter-quirk</div>
          <div class="section-value">${PARTY_QUIRKS[partyId] || '—'}</div>
        </div>

        ${dbLabel ? `
        <div class="card-section">
          <div class="section-label">Coalitie</div>
          <span class="dealbreaker-badge">⚠ ${dbLabel}</span>
        </div>` : ''}

        ${relaties ? `
        <div class="card-section">
          <div class="section-label">Bondgenoten</div>
          <div class="section-value">${relaties}</div>
        </div>` : ''}

        ${speeltip ? `
        <div class="card-section">
          <div class="section-label">Speeltip</div>
          <button class="speeltip-toggle" onclick="toggleSpeeltip(this)">💡 Toon speeltip</button>
          <div class="speeltip-revealed" id="speeltip-text">${speeltip}</div>
        </div>` : ''}

        <div class="card-section">
          <div class="section-label">Geheime bonus</div>
          <button class="bonus-toggle" onclick="toggleBonus(this)">🔒 Toon geheime bonus (alleen voor jou)</button>
          <div class="bonus-revealed" id="bonus-text">${PARTY_BONUSES[partyId] || '—'}</div>
        </div>

        <div class="card-section" id="agenda-section">
          <div class="section-label">Geheime Agenda <span style="font-size:0.7rem;color:var(--text-dim);font-family:'EB Garamond',serif;font-style:italic;">(Ronde 4)</span></div>
          <div id="agenda-content"><div class="agenda-pending">Wordt ingesteld door de informateur...</div></div>
        </div>
      </div>`;
  }

  function toggleAgenda(btn) {
    const el = document.getElementById('agenda-text');
    const visible = el.classList.toggle('visible');
    btn.textContent = visible ? '🎭 Verberg geheime agenda' : '🎭 Toon jouw geheime agenda';
  }

  function updateAgendaSection(agendaType) {
    const def = AGENDA_DEFINITIONS[agendaType];
    if (!def) return;
    const el = document.getElementById('agenda-content');
    if (!el) return;
    el.innerHTML = `
      <button class="agenda-toggle" onclick="toggleAgenda(this)">🎭 Toon jouw geheime agenda</button>
      <div class="agenda-revealed" id="agenda-text">
        <div class="agenda-type-badge">${def.label}</div>
        <div class="agenda-definition">${def.text}</div>
        <div class="agenda-points">Doel: ${def.goal} → +3 punten</div>
      </div>`;
  }

  function toggleBonus(btn) {
    const el = document.getElementById('bonus-text');
    const visible = el.classList.toggle('visible');
    btn.textContent = visible ? '🔓 Verberg geheime bonus' : '🔒 Toon geheime bonus (alleen voor jou)';
  }

  function toggleSpeeltip(btn) {
    const el = document.getElementById('speeltip-text');
    const visible = el.classList.toggle('visible');
    btn.textContent = visible ? '💡 Verberg speeltip' : '💡 Toon speeltip';
  }

  // ── STATUS BAR ───────────────────────────────────────────────
  function updateStatusBar(voteOpen, voteLabel) {
    const el = document.getElementById('status-vote-label');
    if (voteOpen && voteLabel) {
      el.textContent = `🗳 ${voteLabel}`;
      el.classList.add('active');
    } else {
      el.textContent = '';
      el.classList.remove('active');
    }
  }

  // ── VOTE OVERLAY ─────────────────────────────────────────────
  function showVoteOverlay(voteTopic, voteLabel) {
    currentVoteTopic = voteTopic;
    const overlay = document.getElementById('vote-overlay');
    document.getElementById('vote-overlay-topic').textContent = voteLabel || voteTopic;
    document.getElementById('vote-overlay-party').textContent = `Jouw stem als ${partyId}`;

    const alreadyVoted = sessionStorage.getItem(`voted_${voteTopic}`);
    const btnVoor  = document.getElementById('btn-voor');
    const btnTegen = document.getElementById('btn-tegen');
    const conf     = document.getElementById('vote-confirmation');

    if (alreadyVoted) {
      btnVoor.disabled  = true;
      btnTegen.disabled = true;
      conf.textContent  = `Jij stemde: ${alreadyVoted.toUpperCase()} ✓`;
      conf.classList.add('visible');
    } else {
      btnVoor.disabled  = false;
      btnTegen.disabled = false;
      conf.classList.remove('visible');
    }

    overlay.classList.add('active');
  }

  function hideVoteOverlay() {
    currentVoteTopic = null;
    document.getElementById('vote-overlay').classList.remove('active');
    document.getElementById('vote-confirmation').classList.remove('visible');
  }

  // ── ELECTION OVERLAY ─────────────────────────────────────────
  let electionDistribution = {};
  let electionMySeats = 0;
  let electionOtherParties = [];

  function updateElectionCounter() {
    const used = Object.values(electionDistribution).reduce((a, b) => a + b, 0);
    const left = electionMySeats - used;
    const counter = document.getElementById('election-counter');
    if (!counter) return;
    counter.textContent = left === 0 ? '✓ Alle stemfiches verdeeld' : `Nog ${left} te verdelen`;
    counter.className = 'election-counter' + (left === 0 ? ' zero' : '');
    const alreadySubmitted = sessionStorage.getItem('submitted_VERKIEZING');
    document.getElementById('election-submit-btn').disabled = left !== 0 || !!alreadySubmitted;
    electionOtherParties.forEach(id => {
      const minBtn = document.getElementById(`elec-min-${id}`);
      const plusBtn = document.getElementById(`elec-plus-${id}`);
      if (minBtn) minBtn.disabled = electionDistribution[id] <= 0;
      if (plusBtn) plusBtn.disabled = left <= 0;
    });
  }

  function adjustElectionVote(id, delta) {
    electionDistribution[id] = Math.max(0, (electionDistribution[id] || 0) + delta);
    document.getElementById(`elec-count-${id}`).textContent = electionDistribution[id];
    updateElectionCounter();
  }

  function showElectionOverlay(session) {
    const activeParties = session.active_parties || PARTIES.map(p => p.id);
    const sorted = [...activeParties].sort();
    const base = Math.floor(150 / sorted.length);
    const remainder = 150 % sorted.length;
    electionMySeats = sorted.indexOf(partyId) < remainder ? base + 1 : base;
    electionOtherParties = sorted.filter(id => id !== partyId);

    electionDistribution = {};
    electionOtherParties.forEach(id => { electionDistribution[id] = 0; });

    document.getElementById('election-overlay-sub').innerHTML =
      `Jij speelt ${partyId} — je hebt <strong>${electionMySeats}</strong> stemfiches te verdelen<br><small style="color:var(--text-dim)">💡 Elke partij krijgt minimaal 5 zetels + bonus op basis van stemmen</small>`;

    const partiesEl = document.getElementById('election-parties');
    partiesEl.innerHTML = '';
    electionOtherParties.forEach(id => {
      const party = PARTIES.find(p => p.id === id);
      const name = party ? `${party.id} — ${party.full}` : id;
      const row = document.createElement('div');
      row.className = 'election-party-row';
      row.innerHTML = `
        <span class="election-party-name">${name}</span>
        <div class="election-party-controls">
          <button class="election-adj-btn" id="elec-min-${id}" disabled
            onclick="adjustElectionVote('${id}', -1)">−</button>
          <span class="election-party-count" id="elec-count-${id}">0</span>
          <button class="election-adj-btn" id="elec-plus-${id}"
            onclick="adjustElectionVote('${id}', 1)">+</button>
        </div>`;
      partiesEl.appendChild(row);
    });

    const alreadySubmitted = sessionStorage.getItem('submitted_VERKIEZING');
    if (alreadySubmitted) {
      const conf = document.getElementById('election-confirmation');
      conf.textContent = '✓ Jouw stem is uitgebracht';
      conf.classList.add('visible');
    } else {
      document.getElementById('election-confirmation').classList.remove('visible');
    }

    updateElectionCounter();
    document.getElementById('election-overlay').classList.add('active');
  }

  function hideElectionOverlay() {
    document.getElementById('election-overlay').classList.remove('active');
    document.getElementById('election-confirmation').classList.remove('visible');
  }

  async function submitElection() {
    const btn = document.getElementById('election-submit-btn');
    if (btn.disabled) return;
    if (sessionStorage.getItem('submitted_VERKIEZING')) return;
    btn.disabled = true;

    try {
      const { error } = await sb.from('player_votes').upsert({
        game_id:    gameId,
        party_id:   partyId,
        vote_topic: 'VERKIEZING',
        choice:     JSON.stringify(electionDistribution),
      }, { onConflict: 'game_id,party_id,vote_topic' });

      if (error) {
        console.error('Supabase election submit error:', error.code, error.message, error.details);
        btn.disabled = false;
        alert(`Fout bij indienen: ${error.message || 'Probeer opnieuw.'}`);
        return;
      }

      sessionStorage.setItem('submitted_VERKIEZING', '1');
      const conf = document.getElementById('election-confirmation');
      conf.textContent = '✓ Jouw stem is uitgebracht';
      conf.classList.add('visible');
    } catch (err) {
      console.error('Supabase submitElection exception:', err);
      btn.disabled = false;
      alert('Netwerkfout bij indienen. Probeer opnieuw.');
    }
  }

  // ── CAST VOTE ────────────────────────────────────────────────
  async function castVote(choice) {
    const topic = currentVoteTopic;
    if (!topic) return;
    if (sessionStorage.getItem(`voted_${topic}`)) return;

    document.getElementById('btn-voor').disabled  = true;
    document.getElementById('btn-tegen').disabled = true;

    try {
      const { error } = await sb.from('player_votes').upsert({
        game_id:      gameId,
        party_id:     partyId,
        vote_topic:   topic,
        choice:       choice,
      }, { onConflict: 'game_id,party_id,vote_topic' });

      if (error) {
        console.error('Supabase vote error:', error.code, error.message, error.details);
        document.getElementById('btn-voor').disabled  = false;
        document.getElementById('btn-tegen').disabled = false;
        alert(`Fout bij stemmen: ${error.message || 'Probeer opnieuw.'}`);
        return;
      }

      sessionStorage.setItem(`voted_${topic}`, choice);
      const conf = document.getElementById('vote-confirmation');
      conf.textContent = `Jouw stem: ${choice.toUpperCase()} ✓`;
      conf.classList.add('visible');
    } catch (err) {
      console.error('Supabase castVote exception:', err);
      document.getElementById('btn-voor').disabled  = false;
      document.getElementById('btn-tegen').disabled = false;
      alert('Netwerkfout bij stemmen. Probeer opnieuw.');
    }
  }

  // ── SESSION HANDLER ──────────────────────────────────────────
  function updateFromSession(session) {
    if (session.agendas && session.agendas[partyId] && session.agendas[partyId] !== myAgenda) {
      myAgenda = session.agendas[partyId];
      updateAgendaSection(myAgenda);
    }
    updateStatusBar(session.vote_open, session.vote_label);
    if (session.vote_open && session.vote_topic === 'VERKIEZING') {
      hideVoteOverlay();
      showElectionOverlay(session);
    } else if (session.vote_open && session.vote_topic) {
      hideElectionOverlay();
      showVoteOverlay(session.vote_topic, session.vote_label);
    } else {
      hideVoteOverlay();
      hideElectionOverlay();
    }
  }

  async function loadSession() {
    try {
      const { data, error } = await sb.from('game_sessions')
        .select('*')
        .eq('game_id', gameId)
        .single();
      if (error) {
        console.warn('Supabase loadSession error:', error);
        return;
      }
      if (data) updateFromSession(data);
    } catch (err) {
      console.error('Supabase loadSession exception:', err);
    }
  }

  function subscribeSession() {
    try {
      sb.channel('session_feed_' + gameId)
        .on('postgres_changes', {
          event: 'UPDATE',
          schema: 'public',
          table: 'game_sessions',
          filter: `game_id=eq.${gameId}`,
        }, (payload) => {
          try {
            updateFromSession(payload.new);
          } catch (err) {
            console.error('Error in session update handler:', err);
          }
        })
        .subscribe(async (status) => {
          if (status === 'SUBSCRIBED') {
            await loadSession();
          } else if (status === 'CHANNEL_ERROR') {
            console.warn('Session subscription channel error');
          }
        });
    } catch (err) {
      console.error('Failed to subscribe to session:', err);
    }
  }

  // ── INIT ─────────────────────────────────────────────────────
  (async () => {
    if (!partyId || !gameId) {
      showError('Ongeldige link', 'Deze link mist een partij of spel-ID. Vraag de spelleider om een nieuwe QR-code.');
      return;
    }
    const party = PARTIES.find(p => p.id === partyId);
    if (!party) {
      showError('Onbekende partij', `"${partyId}" is geen geldige partij.`);
      return;
    }

    renderPartyCard();
    await loadSession();
    subscribeSession();
  })();
  </script>
